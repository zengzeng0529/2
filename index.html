<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMU STUDIO | 沐目 美睫記帳系統</title>
    <style>
        /* --- 韓系奶油風 變數設定 --- */
        :root {
            --bg-cream: #FDFBF7;
            --main-butter: #F5EBE0;
            --accent-latte: #E3D5CA;
            --text-dark: #4A3E3D;
            --text-muted: #8C7A78;
            --pure-white: #FFFFFF;
            --shadow-soft: rgba(140, 122, 120, 0.08);
            --delete-red: #E07A5F;
            --income-green: #95B46A;
            --expense-red: #E07A5F;
        }

        /* --- 全局樣式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            padding-top: 60px; /* 留給頂部快選列的空間 */
            padding-bottom: 30px;
        }

        /* --- 頂部快選列 (Quick Toolbar) --- */
        .top-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--pure-white);
            box-shadow: 0 2px 10px var(--shadow-soft);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding: 0 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn.active {
            background-color: var(--main-butter);
            color: var(--text-dark);
            font-weight: bold;
        }

        /* --- 店名 Header --- */
        .shop-header {
            text-align: center;
            margin: 25px 0 15px 0;
        }
        .shop-header h1 {
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--text-dark);
            font-weight: 600;
        }
        .shop-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* --- 頁面容器切換 --- */
        .page {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .page.active {
            display: block;
        }

        /* --- 圓弧卡片方框通用樣式 --- */
        .card-box {
            background-color: var(--pure-white);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow-soft);
            margin-bottom: 20px;
            border: 1px solid rgba(227, 213, 202, 0.3);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ==================== 頁面 1: 月曆 ==================== */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-header button {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-dark);
            cursor: pointer;
            padding: 5px 10px;
        }
        .calendar-header span {
            font-weight: 600;
            font-size: 16px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 12px;
            text-align: center;
        }

        .day-cell {
            position: relative;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-dark);
        }

        .day-cell.empty {
            cursor: default;
        }

        /* 深色圓形背景 (標記當日或選中日) */
        .day-cell .day-number {
            position: relative;
            z-index: 2;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        /* 當日樣式（預設深色圓形） */
        .day-cell.today .day-number {
            background-color: var(--text-muted);
            color: var(--pure-white);
        }

        /* 被點選的日期樣式 */
        .day-cell.selected .day-number {
            background-color: var(--text-dark) !important;
            color: var(--pure-white) !important;
        }

        /* 日期下方的小記帳提示點 */
        .day-dot {
            width: 4px;
            height: 4px;
            background-color: var(--accent-latte);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            z-index: 3;
        }

        /* 新增紀錄快速表單 */
        .quick-add-form {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .quick-add-form select, .quick-add-form input {
            border: 1px solid var(--accent-latte);
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 14px;
            color: var(--text-dark);
            background-color: var(--bg-cream);
            outline: none;
        }
        .quick-add-form select { width: 75px; }
        .quick-add-form input[type="text"] { flex: 2; }
        .quick-add-form input[type="number"] { flex: 1; min-width: 70px; }
        .quick-add-form button {
            background-color: var(--text-dark);
            color: var(--pure-white);
            border: none;
            border-radius: 12px;
            padding: 0 15px;
            font-size: 14px;
            cursor: pointer;
        }

        /* 條列式紀錄列表 */
        .record-list {
            list-style: none;
            max-height: 250px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(227, 213, 202, 0.2);
            font-size: 14px;
        }
        .record-item:last-child {
            border-bottom: none;
        }

        .record-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .type-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: bold;
        }
        .type-tag.inc { background-color: #E8F0FE; color: #1A73E8; }
        .type-tag.exp { background-color: #FCE8E6; color: var(--delete-red); }

        .record-amount {
            font-weight: 600;
            margin-right: 10px;
        }
        .record-amount.inc { color: var(--income-green); }
        .record-amount.exp { color: var(--expense-red); }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }
        .btn-delete:active {
            transform: scale(0.85);
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            padding: 20px 0;
        }

        /* ==================== 頁面 2: 總紀錄 ==================== */
        .search-bar {
            margin-bottom: 15px;
            width: 100%;
            border: 1px solid var(--accent-latte);
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            outline: none;
            background-color: var(--pure-white);
        }
        
        .all-records-container {
            max-height: 60vh;
            overflow-y: auto;
        }

        .all-record-date-group {
            margin-bottom: 15px;
        }

        .date-group-title {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 5px;
            background-color: var(--main-butter);
            padding: 2px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        /* ==================== 頁面 3: 報表 ==================== */
        .report-summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-mini-card {
            background-color: var(--bg-cream);
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(227, 213, 202, 0.4);
        }

        .summary-mini-card p {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .summary-mini-card h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .progress-bar-bg {
            background-color: var(--main-butter);
            height: 8px;
            border-radius: 4px;
            width: 100%;
            margin-top: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--text-muted);
            width: 0%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>

    <nav class="top-toolbar">
        <button class="nav-btn active" onclick="switchPage('calendar-page', this)">1. 月曆</button>
        <button class="nav-btn" onclick="switchPage('all-records-page', this)">2. 總紀錄</button>
        <button class="nav-btn" onclick="switchPage('reports-page', this)">3. 報表</button>
    </nav>

    <header class="shop-header">
        <h1>MUMU STUDIO</h1>
        <p>沐 目 ﹒ 美 睫 記 帳 系統</p>
    </header>

    <main id="calendar-page" class="page active">
        <div class="card-box">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">❮</button>
                <span id="calendar-month-year">2026 年 6 月</span>
                <button onclick="changeMonth(1)">❯</button>
            </div>
            
            <div class="weekdays">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            
            <div id="calendar-days" class="days-grid">
                </div>
        </div>

        <div class="card-box">
            <div class="card-title">
                <span id="selected-date-label">6月10日 收支紀錄</span>
            </div>

            <div class="quick-add-form">
                <select id="add-type">
                    <option value="收入">收入</option>
                    <option value="支出">支出</option>
                </select>
                <input type="text" id="add-note" placeholder="項目（如：美睫、材料）" autocomplete="off">
                <input type="number" id="add-amount" placeholder="金額" inputmode="numeric">
                <button onclick="addRecord()">新增</button>
            </div>

            <ul id="day-record-list" class="record-list">
                </ul>
        </div>
    </main>

    <main id="all-records-page" class="page">
        <div class="card-box">
            <div class="card-title">歷史所有明細</div>
            <input type="text" id="search-input" class="search-bar" placeholder="🔍 輸入關鍵字搜尋（如：客名、備註）" oninput="renderAllRecords()">
            
            <div id="all-records-container" class="all-records-container">
                </div>
        </div>
    </main>

    <main id="reports-page" class="page">
        <div class="report-summary">
            <div class="summary-mini-card">
                <p>本月總收入</p>
                <h3 id="rep-total-income" style="color: var(--income-green);">$0</h3>
            </div>
            <div class="summary-mini-card">
                <p>本月總支出</p>
                <h3 id="rep-total-expense" style="color: var(--expense-red);">$0</h3>
            </div>
        </div>

        <div class="card-box">
            <div class="card-title">
                <span>財務分析與排行</span>
                <span id="report-month-label" style="font-size: 13px; color: var(--text-muted);"></span>
            </div>
            
            <div class="stat-row" style="margin-bottom: 20px;">
                <span style="font-weight: bold;">本月營運淨利:</span>
                <span id="rep-net-profit" style="font-size: 18px; font-weight: bold;">$0</span>
            </div>

            <div style="margin-top: 15px;">
                <p style="font-size: 14px; font-weight: 600; margin-bottom: 10px;">收入項目排行</p>
                <div id="income-ranking-container">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // --- 初始化資料與狀態 ---
        let records = JSON.parse(localStorage.getItem('mumu_records')) || [];
        
        let currentDate = new Date(); // 用於月曆切換
        const todayStr = formatDateString(new Date()); // 今天的 YYYY-MM-DD
        let selectedDateStr = todayStr; // 預設點選日期為今天

        // 初始化載入
        window.onload = function() {
            initCalendar();
            renderDayRecords();
        };

        // --- 輔助函式：格式化日期為 YYYY-MM-DD ---
        function formatDateString(dateObj) {
            const y = dateObj.getFullYear();
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const d = String(dateObj.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // --- 導覽頁面切換 ---
        function switchPage(pageId, btnElement) {
            // 切換按鈕高亮
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // 切換顯示頁面
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            // 進入特定頁面時重新整理資料
            if (pageId === 'all-records-page') {
                renderAllRecords();
            } else if (pageId === 'reports-page') {
                renderReports();
            } else if (pageId === 'calendar-page') {
                initCalendar();
                renderDayRecords();
            }
        }

        // ==================== 頁面 1: 月曆與動態渲染 ====================
        function initCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // 更新月曆標題
            document.getElementById('calendar-month-year').innerText = `${year} 年 ${month + 1} 月`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            const daysContainer = document.getElementById('calendar-days');
            daysContainer.innerHTML = '';

            // 填補上個月空白
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('day-cell', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            // 生成當月日期
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('day-cell');

                const currentCellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                dayCell.innerHTML = `<div class="day-number">${day}</div>`;

                // 檢查是否有記帳紀錄，有則顯示提示小點
                const hasRecord = records.some(r => r.date === currentCellDateStr);
                if (hasRecord) {
                    const dot = document.createElement('div');
                    dot.classList.add('day-dot');
                    dayCell.appendChild(dot);
                }

                // 處理「當日預設」與「點選」的深色圓形邏輯
                // 1. 如果是今天，先加上 today 樣式（預設深色圓形）
                if (currentCellDateStr === todayStr) {
                    dayCell.classList.add('today');
                }
                // 2. 如果是被使用者點選的日期，加上 selected 樣式（此時 CSS 權重會覆蓋 today）
                if (currentCellDateStr === selectedDateStr) {
                    dayCell.classList.add('selected');
                }

                // 點擊日期事件
                dayCell.onclick = function() {
                    selectedDateStr = currentCellDateStr;
                    
                    // 移除其他日期的選取狀態，並將此日期設為選取
                    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                    dayCell.classList.add('selected');

                    renderDayRecords();
                };

                daysContainer.appendChild(dayCell);
            }
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            initCalendar();
        }

        // 渲染指定日期的收支明細
        function renderDayRecords() {
            // 更新下方方框的日期標題
            const dateParts = selectedDateStr.split('-');
            document.getElementById('selected-date-label').innerText = `${parseInt(dateParts[1])}月${parseInt(dateParts[2])}日 收支紀錄`;

            const dayRecords = records.filter(r => r.date === selectedDateStr);
            const listContainer = document.getElementById('day-record-list');
            listContainer.innerHTML = '';

            if (dayRecords.length === 0) {
                listContainer.innerHTML = '<li class="no-data">今日尚無收支紀錄清單</li>';
                return;
            }

            dayRecords.forEach(rec => {
                const li = document.createElement('li');
                li.classList.add('record-item');

                const isInc = rec.type === '收入';
                const typeClass = isInc ? 'inc' : 'exp';
                const sign = isInc ? '+' : '-';

                li.innerHTML = `
                    <div class="record-info">
                        <span class="type-tag ${typeClass}">${rec.type}</span>
                        <span>${escapeHtml(rec.note)}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="record-amount ${typeClass}">${sign}$${rec.amount}</span>
                        <button class="btn-delete" onclick="deleteRecord('${rec.id}')">🗑️</button>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        // 新增收支紀錄
        function addRecord() {
            const type = document.getElementById('add-type').value;
            const noteInput = document.getElementById('add-note');
            const amountInput = document.getElementById('add-amount');

            const note = noteInput.value.trim() || (type === '收入' ? '美睫服務' : '雜項支出');
            const amount = parseInt(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                alert('請輸入正確的金額數字');
                return;
            }

            const newRecord = {
                id: 'id_' + Date.now() + Math.random().toString(36).substr(2, 4),
                date: selectedDateStr,
                type: type,
                note: note,
                amount: amount
            };

            records.push(newRecord);
            saveData();

            // 清空輸入欄位
            noteInput.value = '';
            amountInput.value = '';

            // 重新整理 UI
            initCalendar();
            renderDayRecords();
        }

        // 刪除單筆紀錄
        function deleteRecord(id) {
            if(confirm('確定要刪除此筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                saveData();
                initCalendar();
                renderDayRecords();
            }
        }


        // ==================== 頁面 2: 總紀錄 邏輯 ====================
        function renderAllRecords() {
            const container = document.getElementById('all-records-container');
            const searchKey = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = '';

            // 篩選符合關鍵字的紀錄
            let filtered = records;
            if (searchKey) {
                filtered = records.filter(r => 
                    r.note.toLowerCase().includes(searchKey) || 
                    r.type.includes(searchKey) ||
                    r.date.includes(searchKey)
                );
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-data">找不到相關紀錄</div>';
                return;
            }

            // 按日期由新到舊排序
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));

            // 群組化按日期顯示
            let currentGroupDate = "";
            let currentGroupDiv = null;

            filtered.forEach(rec => {
                if (rec.date !== currentGroupDate) {
                    currentGroupDate = rec.date;
                    
                    const groupWrapper = document.createElement('div');
                    groupWrapper.classList.add('all-record-date-group');
                    
                    const dateTitle = document.createElement('div');
                    dateTitle.classList.add('date-group-title');
                    dateTitle.innerText = rec.date;
                    groupWrapper.appendChild(dateTitle);
                    
                    container.appendChild(groupWrapper);
                    currentGroupDiv = groupWrapper;
                }

                const item = document.createElement('div');
                item.classList.add('record-item');
                const isInc = rec.type === '收入';
                const typeClass = isInc ? 'inc' : 'exp';
                
                item.innerHTML = `
                    <div class="record-info">
                        <span class="type-tag ${typeClass}">${rec.type}</span>
                        <span>${escapeHtml(rec.note)}</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="record-amount ${typeClass}">${isInc?'+':'-'}$${rec.amount}</span>
                        <button class="btn-delete" onclick="deleteRecordFromTotal('${rec.id}')">🗑️</button>
                    </div>
                `;
                currentGroupDiv.appendChild(item);
            });
        }

        function deleteRecordFromTotal(id) {
            if(confirm('確定要刪除此筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                saveData();
                renderAllRecords();
            }
        }


        // ==================== 頁面 3: 報表 邏輯 ====================
        function renderReports() {
            // 以當前月曆選擇的月份作為報表基準月
            const targetYear = currentDate.getFullYear();
            const targetMonth = currentDate.getMonth(); // 0-11
            
            document.getElementById('report-month-label').innerText = `${targetYear}年${targetMonth+1}月 統計`;

            // 篩選當月資料
            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === targetYear && d.getMonth() === targetMonth;
            });

            let totalIncome = 0;
            let totalExpense = 0;
            let itemRanking = {};

            monthRecords.forEach(r => {
                if (r.type === '收入') {
                    totalIncome += r.amount;
                    // 統計各項收入項目的累積金額排行
                    itemRanking[r.note] = (itemRanking[r.note] || 0) + r.amount;
                } else {
                    totalExpense += r.amount;
                }
            });

            const netProfit = totalIncome - totalExpense;

            // 渲染看板數字
            document.getElementById('rep-total-income').innerText = `$${totalIncome.toLocaleString()}`;
            document.getElementById('rep-total-expense').innerText = `$${totalExpense.toLocaleString()}`;
            
            const netProfitEl = document.getElementById('rep-net-profit');
            netProfitEl.innerText = `${netProfit >= 0 ? '' : '-'}$${Math.abs(netProfit).toLocaleString()}`;
            netProfitEl.style.color = netProfit >= 0 ? 'var(--income-green)' : 'var(--expense-red)';

            // 渲染排行
            const rankingContainer = document.getElementById('income-ranking-container');
            rankingContainer.innerHTML = '';

            // 轉為陣列並排序
            const sortedRank = Object.keys(itemRanking).map(key => {
                return { note: key, amount: itemRanking[key] };
            }).sort((a, b) => b.amount - a.amount);

            if(sortedRank.length === 0) {
                rankingContainer.innerHTML = '<p class="no-data" style="font-size:12px;">本月無收入項目排行</p>';
                return;
            }

            const maxAmount = sortedRank[0].amount; // 最高金額者為 100% 條

            sortedRank.forEach((item, index) => {
                const percentage = maxAmount > 0 ? (item.amount / maxAmount) * 100 : 0;
                
                const rankRow = document.createElement('div');
                rankRow.style.marginBottom = '12px';
                rankRow.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text-dark);">
                        <span>${index + 1}. ${escapeHtml(item.note)}</span>
                        <span style="font-weight:600;">$${item.amount.toLocaleString()}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                `;
                rankingContainer.appendChild(rankRow);
            });
        }


        // ==================== 全域資料儲存與防範 ====================
        function saveData() {
            localStorage.setItem('mumu_records', JSON.stringify(records));
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
