    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 主體設定檔（已修正內部語法錯誤）
        const firebaseConfig = {
            apiKey: "AIzaSyBskoljPhASGXHB2oPqMFHjr2X4NajGVXk",
            authDomain: "studio-6429e.firebaseapp.com",
            projectId: "studio-6429e",
            storageBucket: "studio-6429e.firebasestorage.app",
            messagingSenderId: "647698948838",
            appId: "1:647698948838:web:9f51ddc458fa93ff6f9127",
            measurementId: "G-LR1MP5QJJ9"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 全域變數
        let currentUser = null;
        let records = [];
        let customerCRM = {};
        let currentDate = new Date();
        const todayStr = formatDateString(new Date());
        let selectedDateStr = todayStr;
        let currentReportDetailFilter = '';

        // 監聽登入狀態切換
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-display-email').innerText = `帳號：${user.email}`;
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                // 從雲端載入該使用者的資料
                await loadCloudData();
                
                // 網頁元件初始化
                buildYearDropdowns();
                buildMonthDropdown();
                initCalendar();
                renderDayRecords();
                handleTypeChange();
                renderReports();
                renderCustomerPage();
            } else {
                currentUser = null;
                document.getElementById('auth-page').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        // 註冊帳號
        window.handleRegister = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert('請輸入完整信箱與密碼');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                alert('帳號註冊成功並已自動登入！');
            } catch (error) {
                alert('註冊失敗：' + error.message);
            }
        }

        // 登入系統
        window.handleLogin = async function() {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;
            if(!email || !password) return alert('請輸入信箱與密碼');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert('登入失敗：' + error.message);
            }
        }

        // 登出系統
        window.handleLogout = function() {
            if(confirm('確定要登出系統嗎？')) {
                signOut(auth);
            }
        }

        // 從 Firebase 雲端讀取資料
        async function loadCloudData() {
            if (!currentUser) return;
            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                const docSnap = await getDoc(userDocRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    records = data.records || [];
                    customerCRM = data.customerCRM || {};
                } else {
                    // 若是新使用者，嘗試看看本機有沒有舊資料(自動移轉機制)
                    const oldData = loadSavedLocalData();
                    records = oldData.records;
                    customerCRM = oldData.crm;
                    // 馬上存入雲端備份
                    await saveCloudData();
                }
            } catch (e) {
                console.error("讀取雲端資料失敗：", e);
            }
        }

        // 本地舊資料救援讀取（向下相容）
        function loadSavedLocalData() {
            const recordKeys = ['mumu_records_v4', 'mumu_records_v3', 'mumu_records_v2', 'mumu_records'];
            const crmKeys = ['mumu_crm_v4', 'mumu_crm_v3', 'mumu_crm_v2', 'mumu_crm'];
            let loadedRecords = null, loadedCRM = null;
            for (let key of recordKeys) {
                let data = localStorage.getItem(key);
                if (data) { try { loadedRecords = JSON.parse(data); break; } catch(e){} }
            }
            for (let key of crmKeys) {
                let data = localStorage.getItem(key);
                if (data) { try { loadedCRM = JSON.parse(data); break; } catch(e){} }
            }
            return { records: loadedRecords || [], crm: loadedCRM || {} };
        }

        // 同步資料回 Firebase 雲端
        async function saveCloudData() {
            if (!currentUser) return;
            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                await setDoc(userDocRef, {
                    records: records,
                    customerCRM: customerCRM,
                    lastUpdated: new Date().toISOString()
                }, { merge: true });
            } catch (e) {
                console.error("同步至雲端失敗：", e);
            }
        }

        // ==================== 以下為你原有的記帳邏輯 (已串接 saveCloudData) ====================
        function formatDateString(dateObj) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }
        function escapeHtml(text) {
            if(!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        function formatDepositDisplay(val, type) {
            if (val === undefined || val === null || val === '') return '未記錄';
            return type === '課堂數' ? `${val} 堂` : `$${val}`;
        }
        window.handleTypeChange = function() {
            const type = document.getElementById('add-type').value;
            const custWrapper = document.getElementById('cust-name-wrapper');
            const depositRow = document.getElementById('deposit-wrapper-row');
            if (type === '收入') {
                custWrapper.style.display = 'block'; depositRow.style.display = 'grid'; 
            } else {
                custWrapper.style.display = 'none'; depositRow.style.display = 'none';
                document.getElementById('add-cust-name').value = ''; document.getElementById('add-deposit').value = '';
            }
        }
        window.quickSelectProject = function(projectName) {
            document.getElementById('add-project').value = projectName;
        }
        function buildYearDropdowns() {
            const currentYear = new Date().getFullYear();
            const calYearSelect = document.getElementById('select-cal-year');
            const reportYearSelect = document.getElementById('report-year-select');
            if (calYearSelect && reportYearSelect) {
                calYearSelect.innerHTML = ''; reportYearSelect.innerHTML = '';
                for (let y = currentYear - 3; y <= currentYear + 5; y++) {
                    let opt1 = document.createElement('option'); opt1.value = y; opt1.innerText = `${y} 年`; calYearSelect.appendChild(opt1);
                    let opt2 = document.createElement('option'); opt2.value = y; opt2.innerText = `${y} 年度`; reportYearSelect.appendChild(opt2);
                }
                reportYearSelect.value = currentYear;
            }
        }
        function buildMonthDropdown() {
            const calMonthSelect = document.getElementById('select-cal-month');
            if (calMonthSelect) {
                calMonthSelect.innerHTML = '';
                for (let m = 0; m < 12; m++) {
                    let opt = document.createElement('option'); opt.value = m; opt.innerText = `${m + 1} 月`; calMonthSelect.appendChild(opt);
                }
            }
        }
        window.switchPage = function(pageId, btnElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'all-records-page') renderAllRecords();
            if (pageId === 'reports-page') { closeReportDetail(); renderReports(); }
            if (pageId === 'calendar-page') { initCalendar(); renderDayRecords(); }
            if (pageId === 'customers-page') renderCustomerPage();
        }
        window.openEditModal = function(id, event) {
            if(event) event.stopPropagation();
            const rec = records.find(r => r.id === id);
            if (!rec) return;
            document.getElementById('edit-id').value = rec.id;
            document.getElementById('modal-edit-date').value = rec.date;
            document.getElementById('modal-edit-project').value = rec.project;
            document.getElementById('modal-edit-amount').value = rec.amount;
            document.getElementById('modal-edit-note').value = rec.note || '';
            const nameWrapper = document.getElementById('modal-cust-wrapper');
            const depositWrapper = document.getElementById('modal-deposit-wrapper');
            if(rec.type === '收入') {
                nameWrapper.style.display = 'block'; depositWrapper.style.display = 'block';
                document.getElementById('modal-edit-name').value = rec.custName || '';
                document.getElementById('modal-edit-deposit-type').value = rec.depositType || '儲值金';
                document.getElementById('modal-edit-deposit').value = rec.deposit !== '' ? rec.deposit : '';
            } else {
                nameWrapper.style.display = 'none'; depositWrapper.style.display = 'none';
            }
            document.getElementById('edit-modal').style.display = 'flex';
        }
        window.closeEditModal = function(event) {
            document.getElementById('edit-modal').style.display = 'none';
        }
        window.updateRecordData = async function() {
            const id = document.getElementById('edit-id').value;
            const recIndex = records.findIndex(r => r.id === id);
            if(recIndex === -1) return;
            const date = document.getElementById('modal-edit-date').value;
            const project = document.getElementById('modal-edit-project').value.trim();
            const amount = parseInt(document.getElementById('modal-edit-amount').value);
            const note = document.getElementById('modal-edit-note').value.trim();
            if (!date || isNaN(amount) || amount < 0) return alert('請輸入有效資料');
            
            records[recIndex].date = date;
            records[recIndex].project = project || (records[recIndex].type === '收入' ? '美睫服務' : '日常開銷');
            records[recIndex].amount = amount;
            records[recIndex].note = note;

            if (records[recIndex].type === '收入') {
                const custName = document.getElementById('modal-edit-name').value.trim();
                const depositType = document.getElementById('modal-edit-deposit-type').value;
                const depositInput = document.getElementById('modal-edit-deposit').value.trim();
                records[recIndex].custName = custName;
                records[recIndex].depositType = depositType;
                records[recIndex].deposit = depositInput !== '' ? parseInt(depositInput) : '';
                if (custName && !customerCRM[custName]) customerCRM[custName] = { phone: '', birthday: '', note: '' };
            }
            await saveCloudData();
            closeEditModal();
            initCalendar(); renderDayRecords(); renderReports(); renderCustomerPage();
            if(document.getElementById('all-records-page').classList.contains('active')) renderAllRecords();
        }
        function initCalendar() {
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            const calYearSel = document.getElementById('select-cal-year');
            const calMonthSel = document.getElementById('select-cal-month');
            if(calYearSel) calYearSel.value = year; if(calMonthSel) calMonthSel.value = month;
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const daysContainer = document.getElementById('calendar-days');
            if(!daysContainer) return; daysContainer.innerHTML = '';
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div'); emptyCell.classList.add('day-cell', 'empty'); daysContainer.appendChild(emptyCell);
            }
            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div'); dayCell.classList.add('day-cell');
                const currentCellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                dayCell.innerHTML = `<div class="day-number">${day}</div>`;
                if (records.some(r => r.date === currentCellDateStr)) {
                    const dot = document.createElement('div'); dot.classList.add('day-dot'); dayCell.appendChild(dot);
                }
                if (currentCellDateStr === todayStr) dayCell.classList.add('today');
                if (currentCellDateStr === selectedDateStr) dayCell.classList.add('selected');
                dayCell.onclick = function() {
                    selectedDateStr = currentCellDateStr;
                    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                    dayCell.classList.add('selected'); renderDayRecords();
                };
                daysContainer.appendChild(dayCell);
            }
        }
        window.selectCalendarDate = function() {
            currentDate.setFullYear(parseInt(document.getElementById('select-cal-year').value));
            currentDate.setMonth(parseInt(document.getElementById('select-cal-month').value));
            initCalendar();
        }
        window.changeMonth = function(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction); initCalendar();
        }
        function renderDayRecords() {
            const labelEl = document.getElementById('selected-date-label'); if(!labelEl) return;
            const dateParts = selectedDateStr.split('-'); labelEl.innerText = `${dateParts[1]}月${dateParts[2]}日 收支紀錄 (點擊可修改)`;
            const dayRecords = records.filter(r => r.date === selectedDateStr);
            const listContainer = document.getElementById('day-record-list'); if(!listContainer) return;
            listContainer.innerHTML = '';
            if (dayRecords.length === 0) { listContainer.innerHTML = '<li class="no-data">今日尚無收支紀錄清單</li>'; return; }
            dayRecords.forEach(rec => {
                const li = document.createElement('li'); li.classList.add('record-item'); li.setAttribute('onclick', `openEditModal('${rec.id}', event)`);
                const isInc = rec.type === '收入'; const typeClass = isInc ? 'inc' : 'exp';
                const displayName = isInc ? (rec.custName ? rec.custName : '無名客') : '店鋪';
                li.innerHTML = `
                    <div class="rec-top">
                        <div><span class="type-tag ${typeClass}">${rec.type}</span><span style="font-weight:600;">${escapeHtml(displayName)}</span></div>
                        <div><span class="record-amount ${typeClass}">${isInc?'+':'-'}$${rec.amount}</span><button class="btn-delete" onclick="deleteRecord('${rec.id}', 'day', event)">🗑️</button></div>
                    </div>
                    <div class="rec-mid">項目: ${escapeHtml(rec.project)}</div>
                    <div class="rec-bot">
                        ${isInc ? `<span>${rec.depositType || '儲值金'}餘額: ${formatDepositDisplay(rec.deposit, rec.depositType)}</span>` : ''}
                        ${rec.note ? `<span style="margin-left:10px;">📝 ${escapeHtml(rec.note)}</span>` : ''}
                    </div>`;
                listContainer.appendChild(li);
            });
        }
        window.addRecord = async function() {
            const type = document.getElementById('add-type').value;
            const custName = type === '收入' ? document.getElementById('add-cust-name').value.trim() : '';
            const depositType = type === '收入' ? document.getElementById('add-deposit-type').value : '儲值金';
            const depositInput = type === '收入' ? document.getElementById('add-deposit').value.trim() : '';
            const project = document.getElementById('add-project').value.trim() || (type === '收入' ? '美睫服務' : '日常開銷');
            const amountInput = document.getElementById('add-amount').value.trim();
            const amount = parseInt(amountInput); const note = document.getElementById('add-note').value.trim();
            if (amountInput === '' || isNaN(amount) || amount < 0) return alert('請輸入有效的金額數字');

            records.push({
                id: 'id_' + Date.now() + Math.random().toString(36).substr(2, 4),
                date: selectedDateStr, type: type, custName: custName, project: project, amount: amount,
                depositType: depositType, deposit: depositInput !== '' ? parseInt(depositInput) : '', note: note
            });
            if (type === '收入' && custName && !customerCRM[custName]) customerCRM[custName] = { phone: '', birthday: '', note: '' };
            
            await saveCloudData();
            document.getElementById('add-cust-name').value = ''; document.getElementById('add-project').value = '';
            document.getElementById('add-amount').value = ''; document.getElementById('add-deposit').value = ''; document.getElementById('add-note').value = '';
            initCalendar(); renderDayRecords(); renderReports(); renderCustomerPage();
        }
        window.deleteRecord = async function(id, pageSource, event) {
            if(event) event.stopPropagation();
            if(confirm('❌確定要刪除這筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                await saveCloudData();
                initCalendar(); renderDayRecords(); renderReports(); renderCustomerPage();
                if (pageSource === 'all') renderAllRecords();
            }
        }
        window.renderAllRecords = function() {
            const container = document.getElementById('all-records-container'); if(!container) return;
            const searchKey = document.getElementById('search-input').value.toLowerCase().trim(); container.innerHTML = '';
            let filtered = records.filter(r => r.project.toLowerCase().includes(searchKey) || (r.custName && r.custName.toLowerCase().includes(searchKey)) || (r.note && r.note.toLowerCase().includes(searchKey)));
            if (filtered.length === 0) { container.innerHTML = '<div class="no-data">找不到相關紀錄</div>'; return; }
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            let currentGroupDate = ""; let currentGroupDiv = null;
            filtered.forEach(rec => {
                if (rec.date !== currentGroupDate) {
                    currentGroupDate = rec.date; currentGroupDiv = document.createElement('div');
                    let dT = document.createElement('div'); dT.classList.add('date-group-title'); dT.innerText = rec.date;
                    currentGroupDiv.appendChild(dT); container.appendChild(currentGroupDiv);
                }
                let item = document.createElement('div'); item.classList.add('record-item'); item.setAttribute('onclick', `openEditModal('${rec.id}', event)`);
                let isInc = rec.type === '收入'; let typeClass = isInc ? 'inc' : 'exp';
                item.innerHTML = `
                    <div class="rec-top">
                        <div><span class="type-tag ${typeClass}">${rec.type}</span><span style="font-weight:600;">${escapeHtml(isInc ? rec.custName : '店鋪')}</span></div>
                        <div><span class="record-amount ${typeClass}">${isInc?'+':'-'}$${rec.amount}</span><button class="btn-delete" onclick="deleteRecord('${rec.id}', 'all', event)">🗑️</button></div>
                    </div>
                    <div class="rec-mid">項目: ${escapeHtml(rec.project)}</div>`;
                currentGroupDiv.appendChild(item);
            });
        }
        window.renderReports = function() {
            const yearSel = document.getElementById('report-year-select'); const monthSel = document.getElementById('report-month-select');
            if(!yearSel || !monthSel) return;
            const selectedYear = parseInt(yearSel.value); const selectedMonthVal = monthSel.value;
            const scopeLabel = document.getElementById('report-scope-label');
            if(scopeLabel) scopeLabel.innerText = selectedMonthVal === 'all' ? `${selectedYear} 全年度總覽` : `${selectedYear} 年 ${parseInt(selectedMonthVal) + 1} 月 統計`;
            const filtered = records.filter(r => { let d = new Date(r.date); return d.getFullYear() === selectedYear && (selectedMonthVal === 'all' || d.getMonth() === parseInt(selectedMonthVal)); });
            let inc = 0, exp = 0, rank = {};
            filtered.forEach(r => { if (r.type === '收入') { inc += r.amount; rank[r.project] = (rank[r.project] || 0) + r.amount; } else { exp += r.amount; } });
            document.getElementById('rep-total-income').innerText = `$${inc.toLocaleString()}`;
            document.getElementById('rep-total-expense').innerText = `$${exp.toLocaleString()}`;
            let net = inc - exp; let netEl = document.getElementById('rep-net-profit');
            if(netEl) { netEl.innerText = `$${net.toLocaleString()}`; netEl.style.color = net >= 0 ? 'var(--income-green)' : 'var(--expense-red)'; }
            // 項目排行
            let rankingContainer = document.getElementById('income-ranking-container');
            if(rankingContainer) {
                rankingContainer.innerHTML = '';
                let sorted = Object.keys(rank).map(k => ({project: k, amount: rank[k]})).sort((a,b) => b.amount - a.amount);
                if(!sorted.length) { rankingContainer.innerHTML = '<p class="no-data">此區間尚無收入</p>'; }
                else {
                    let max = sorted[0].amount;
                    sorted.forEach((item, index) => {
                        let row = document.createElement('div'); row.style.marginBottom = '12px';
                        row.innerHTML = `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>${index + 1}. ${escapeHtml(item.project)}</span><strong>$${item.amount.toLocaleString()}</strong></div>
                                         <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${(item.amount/max)*100}%"></div></div>`;
                        rankingContainer.appendChild(row);
                    });
                }
            }
            if (currentReportDetailFilter) renderReportDetailList(filtered, currentReportDetailFilter);
        }
        window.toggleReportDetailFilter = function(type) {
            if (currentReportDetailFilter === type) { closeReportDetail(); return; }
            currentReportDetailFilter = type; document.getElementById('report-detail-box-container').style.display = 'block';
            document.getElementById('report-detail-type-label').innerText = `📊 區間【${type}】項目合計統整`;
            renderReports();
        }
        window.closeReportDetail = function() {
            currentReportDetailFilter = ''; let el = document.getElementById('report-detail-box-container'); if(el) el.style.display = 'none';
        }
        function renderReportDetailList(scopedRecords, type) {
            const listWrapper = document.getElementById('report-detail-list-wrapper'); if(!listWrapper) return; listWrapper.innerHTML = '';
            const targets = scopedRecords.filter(r => r.type === type);
            if (!targets.length) { listWrapper.innerHTML = '<div class="no-data">無數據</div>'; return; }
            let sum = {}; targets.forEach(r => { let p = r.project.trim() || '未命名'; sum[p] = (sum[p] || 0) + r.amount; });
            Object.keys(sum).sort((a,b) => sum[b] - sum[a]).forEach(k => {
                let row = document.createElement('div'); row.classList.add('report-summary-item');
                row.innerHTML = `<span>${escapeHtml(k)}</span><span style="color:${type==='收入'?'var(--income-green)':'var(--delete-red)'}">${type==='收入'?'+':'-'}$${sum[k].toLocaleString()}</span>`;
                listWrapper.appendChild(row);
            });
        }
        window.renderCustomerPage = function() {
            const thisMonth = new Date().getMonth() + 1;
            let mTitleEl = document.getElementById('current-month-title'); if(mTitleEl) mTitleEl.innerText = thisMonth;
            const container = document.getElementById('customers-container'); if(!container) return;
            const searchKey = document.getElementById('cust-search-input')?.value.trim().toLowerCase() || ''; container.innerHTML = '';
            let customerMap = {};

            records.forEach(r => {
                if (r.type === '支出' || !r.custName) return;
                const name = r.custName.trim(); if (searchKey && !name.toLowerCase().includes(searchKey)) return;
                if (!customerMap[name]) {
                    let crmData = customerCRM[name] || { phone: '', birthday: '', note: '' };
                    customerMap[name] = { name: name, phone: crmData.phone||'', birthday: crmData.birthday||'', note: crmData.note||'', visitCount: 0, totalSpent: 0, latestDepositLabel: '剩餘資產', latestDepositValue: '未記錄', latestDepositTime: 0, history: [] };
                }
                customerMap[name].visitCount++; customerMap[name].totalSpent += r.amount; customerMap[name].history.push(r);
                let recordTime = new Date(r.date).getTime();
                if (r.deposit !== '' && recordTime >= customerMap[name].latestDepositTime) {
                    customerMap[name].latestDepositLabel = r.depositType || '儲值金'; customerMap[name].latestDepositValue = formatDepositDisplay(r.deposit, r.depositType); customerMap[name].latestDepositTime = recordTime;
                }
            });
            Object.keys(customerCRM).forEach(name => {
                if (searchKey && !name.toLowerCase().includes(searchKey)) return;
                if (!customerMap[name]) customerMap[name] = { name: name, phone: customerCRM[name].phone||'', birthday: customerCRM[name].birthday||'', note: customerCRM[name].note||'', visitCount: 0, totalSpent: 0, latestDepositLabel: '儲值餘額', latestDepositValue: '未記錄', history: [] };
            });
            let customers = Object.values(customerMap);
            // 壽星提醒
            let birthdayContainer = document.getElementById('birthday-list-container');
            if(birthdayContainer) {
                birthdayContainer.innerHTML = ''; let bCount = 0;
                customers.forEach(c => {
                    if (c.birthday && c.birthday.length === 4 && parseInt(c.birthday.substring(0,2)) === thisMonth) {
                        bCount++; let li = document.createElement('li'); li.innerHTML = `🎉 <strong>${escapeHtml(c.name)}</strong> (${c.birthday.substring(0,2)}月${c.birthday.substring(2,4)}日) ${c.phone ? `📞 ${escapeHtml(c.phone)}` : ''}`; birthdayContainer.appendChild(li);
                    }
                });
                if(!bCount) birthdayContainer.innerHTML = '<li>本月暫無壽星顧客記錄</li>';
            }
            if (!customers.length) { container.innerHTML = '<div class="no-data">暫無客戶資料</div>'; return; }
            customers.sort((a,b) => a.name.localeCompare(b.name, 'zh-Hans-CN'));
            customers.forEach(cust => {
                let card = document.createElement('div'); card.classList.add('customer-card');
                cust.history.sort((a,b) => new Date(b.date) - new Date(a.date));
                let hHtml = cust.history.map(h => `<div style="border-top:1px dashed rgba(227,213,202,0.3); padding-top:4px; margin-top:4px;"><span style="color:var(--text-muted);">${h.date}</span> | <span>${escapeHtml(h.project)}</span> <strong style="color:${h.type==='收入'?'var(--income-green)':'var(--delete-red)'}">($${h.amount})</strong></div>`).join('');
                card.innerHTML = `
                    <div class="customer-card-header" onclick="toggleCard(this.parentNode)">
                        <span class="customer-name">👤 ${escapeHtml(cust.name)}</span>
                        <div class="customer-header-right"><span class="customer-deposit">${cust.latestDepositLabel}: ${cust.latestDepositValue}</span><span class="customer-total-spent">累積消費: $${cust.totalSpent.toLocaleString()}</span></div>
                    </div>
                    <div onclick="toggleCard(this.parentNode)">
                        <div class="customer-detail-row">📞 電話: ${cust.phone ? escapeHtml(cust.phone) : '未填寫'}</div>
                        <div class="customer-detail-row">🎂 生日: ${cust.birthday ? cust.birthday.substring(0,2)+'/'+cust.birthday.substring(2,4) : '未填寫'}</div>
                        <div class="customer-note-highlight">📝 備註：${cust.note ? escapeHtml(cust.note) : '無備註紀錄'}</div>
                    </div>
                    <div class="customer-expanded-zone">
                        <div class="edit-crm-group" onclick="event.stopPropagation()">
                            <div class="edit-crm-title">✏️ 編輯客戶資料</div>
                            <input type="text" id="edit-name-${escapeHtml(cust.name)}" class="input-style" style="background:#fff; margin-bottom:6px;" value="${escapeHtml(cust.name)}">
                            <div style="display:flex; gap:6px; margin-bottom:6px;">
                                <input type="tel" id="edit-phone-${escapeHtml(cust.name)}" class="input-style" style="background:#fff;" value="${escapeHtml(cust.phone)}" placeholder="手機">
                                <input type="number" id="edit-birth-${escapeHtml(cust.name)}" class="input-style" style="background:#fff;" value="${escapeHtml(cust.birthday)}" placeholder="生日4碼">
                            </div>
                            <input type="text" id="edit-note-${escapeHtml(cust.name)}" class="input-style" style="background:#fff; margin-bottom:6px;" value="${escapeHtml(cust.note)}" placeholder="備註">
                            <div class="crm-action-row">
                                <button class="btn-mini-delete" onclick="deleteCustomerData('${escapeHtml(cust.name)}')">🗑️ 刪除客戶</button>
                                <button class="btn-mini-save" onclick="saveCRMData('${escapeHtml(cust.name)}')">💾 儲存修改</button>
                            </div>
                        </div>
                        <div style="max-height:90px; overflow-y:auto; font-size:12px;">${hHtml || '無消費明細'}</div>
                    </div>`;
                container.appendChild(card);
            });
        }
        window.toggleCard = function(cardElement) {
            let isOpen = cardElement.classList.contains('open');
            document.querySelectorAll('.customer-card').forEach(c => c.classList.remove('open'));
            if (!isOpen) cardElement.classList.add('open');
        }
        window.saveCRMData = async function(oldName) {
            const newName = document.getElementById(`edit-name-${oldName}`).value.trim();
            const phoneVal = document.getElementById(`edit-phone-${oldName}`).value.trim();
            const birthVal = document.getElementById(`edit-birth-${oldName}`).value.trim();
            const noteVal = document.getElementById(`edit-note-${oldName}`).value.trim();
            if (!newName) return alert('姓名不能留空');
            if (birthVal && birthVal.length !== 4) return alert('生日請輸入 4 碼數字');

            if (oldName !== newName) {
                records.forEach(r => { if (r.custName && r.custName.trim() === oldName) r.custName = newName; });
                customerCRM[newName] = { phone: phoneVal, birthday: birthVal, note: noteVal };
                delete customerCRM[oldName];
            } else {
                customerCRM[oldName] = { phone: phoneVal, birthday: birthVal, note: noteVal };
            }
            await saveCloudData();
            alert(`資料已成功同步更新！`); renderCustomerPage();
        }
        window.deleteCustomerData = async function(name) {
            if (confirm(`確定要刪除客戶「${name}」的基礎資料嗎？`)) {
                if (customerCRM[name]) delete customerCRM[name];
                await saveCloudData(); renderCustomerPage();
            }
        }
    </script>
