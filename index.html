<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMU STUDIO | 沐目 美睫記帳與進階報表CRM系統</title>
    <style>
        /* --- 韓系奶油風 變數設定 --- */
        :root {
            --bg-cream: #FDFBF7;
            --main-butter: #F5EBE0;
            --accent-latte: #E3D5CA;
            --text-dark: #4A3E3D;
            --text-muted: #8C7A78;
            --pure-white: #FFFFFF;
            --shadow-soft: rgba(140, 122, 120, 0.08);
            --delete-red: #E07A5F;
            --income-green: #95B46A;
            --expense-red: #E07A5F;
            --birthday-pink: #E6B8A2;
        }

        /* --- 全局樣式 --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            padding-top: 65px; 
            padding-bottom: 30px;
        }

        /* --- 頂部快選列 (Quick Toolbar) --- */
        .top-toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--pure-white);
            box-shadow: 0 2px 10px var(--shadow-soft);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding: 0 5px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            padding: 6px 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn.active {
            background-color: var(--main-butter);
            color: var(--text-dark);
            font-weight: bold;
        }

        /* --- 店名 Header --- */
        .shop-header {
            text-align: center;
            margin: 20px 0 15px 0;
        }
        .shop-header h1 {
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--text-dark);
            font-weight: 600;
        }
        .shop-header p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* --- 頁面容器切換 --- */
        .page {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            padding: 0 14px;
        }

        .page.active {
            display: block;
        }

        /* --- 圓弧卡片方框通用樣式 --- */
        .card-box {
            background-color: var(--pure-white);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 4px 20px var(--shadow-soft);
            margin-bottom: 18px;
            border: 1px solid rgba(227, 213, 202, 0.3);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ==================== 頁面 1: 月曆 ==================== */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendar-header button {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text-dark);
            cursor: pointer;
            padding: 5px 10px;
        }
        .calendar-title-select {
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            background-color: var(--bg-cream);
            border: 1px solid var(--accent-latte);
            color: var(--text-dark);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 12px;
            text-align: center;
        }

        .day-cell {
            position: relative;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-dark);
        }

        .day-cell.empty { cursor: default; }

        .day-cell .day-number {
            position: relative;
            z-index: 2;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .day-cell.today .day-number {
            background-color: var(--text-muted);
            color: var(--pure-white);
        }

        .day-cell.selected .day-number {
            background-color: var(--text-dark) !important;
            color: var(--pure-white) !important;
        }

        .day-dot {
            width: 4px;
            height: 4px;
            background-color: var(--accent-latte);
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            z-index: 3;
        }

        /* 表單進階排版 */
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        
        .income-only-field {
            display: grid;
            grid-template-columns: 1fr;
        }
        
        .input-style {
            width: 100%;
            border: 1px solid var(--accent-latte);
            border-radius: 12px;
            padding: 9px 12px;
            font-size: 14px;
            color: var(--text-dark);
            background-color: var(--bg-cream);
            outline: none;
        }
        
        .quick-tag-wrapper {
            grid-column: 1 / -1;
            display: flex;
            gap: 6px;
            margin-top: -2px;
            margin-bottom: 2px;
        }
        .quick-tag {
            background-color: var(--main-butter);
            color: var(--text-dark);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(227, 213, 202, 0.5);
            transition: all 0.2s;
        }
        .quick-tag:hover {
            background-color: var(--accent-latte);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--text-dark);
            color: var(--pure-white);
            border: none;
            border-radius: 12px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
        }

        /* 條列式明細樣式 */
        .record-list { list-style: none; }
        .record-item {
            border-bottom: 1px solid rgba(227, 213, 202, 0.2);
            padding: 12px 0;
        }
        .record-item:last-child { border-bottom: none; }
        
        .rec-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .rec-mid { font-size: 13px; color: var(--text-dark); margin-bottom: 3px; }
        .rec-bot { font-size: 11px; color: var(--text-muted); }

        .type-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: bold;
            margin-right: 4px;
        }
        .type-tag.inc { background-color: #E8F0FE; color: #1A73E8; }
        .type-tag.exp { background-color: #FCE8E6; color: var(--delete-red); }

        .record-amount { font-weight: 600; }
        .record-amount.inc { color: var(--income-green); }
        .record-amount.exp { color: var(--expense-red); }

        .btn-delete { background: none; border: none; cursor: pointer; font-size: 16px; padding-left: 10px; }

        /* ==================== 通用搜尋列與滾動框 ==================== */
        .search-container { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-bar {
            flex: 1; border: 1px solid var(--accent-latte); border-radius: 12px;
            padding: 10px; font-size: 14px; outline: none; background-color: var(--pure-white);
        }
        .btn-search-icon {
            background-color: var(--main-butter); border: 1px solid var(--accent-latte);
            border-radius: 12px; width: 42px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
        }
        .scroll-container { max-height: 55vh; overflow-y: auto; }
        .date-group-title {
            font-size: 12px; color: var(--text-muted); font-weight: 600; margin: 10px 0 5px 0;
            background-color: var(--main-butter); padding: 2px 8px; border-radius: 6px; display: inline-block;
        }

        /* ==================== 頁面 3: 報表 ==================== */
        .report-filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .select-report {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--accent-latte);
            background-color: var(--pure-white);
            color: var(--text-dark);
            font-size: 14px;
            outline: none;
            font-weight: 600;
        }
        .report-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .summary-mini-card {
            background-color: var(--bg-cream); padding: 15px; border-radius: 16px; text-align: center;
            border: 1px solid rgba(227, 213, 202, 0.4);
        }
        .summary-mini-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .summary-mini-card h3 { font-size: 18px; font-weight: 700; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        .progress-bar-bg { background-color: var(--main-butter); height: 6px; border-radius: 3px; width: 100%; margin-top: 4px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background-color: var(--text-muted); width: 0%; transition: width 0.5s ease; }

        /* ==================== 頁面 4: 客戶資料 ==================== */
        .birthday-banner {
            background-color: #FFF0EB;
            border: 1px dashed var(--birthday-pink);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .birthday-banner-title {
            font-size: 13px; font-weight: bold; color: #D87A60; margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
        }
        .birthday-list { font-size: 12px; color: var(--text-dark); list-style: none; padding-left: 4px;}
        .birthday-list li { margin-bottom: 3px; }

        .customer-card {
            background-color: var(--bg-cream); border-radius: 16px; padding: 14px; margin-bottom: 12px;
            border: 1px solid rgba(227, 213, 202, 0.5); cursor: pointer; transition: background-color 0.2s;
        }
        .customer-card:hover { background-color: #F7EFE5; }
        .customer-card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--accent-latte); padding-bottom: 6px; margin-bottom: 8px; }
        .customer-name { font-weight: bold; font-size: 15px; }
        .customer-deposit { font-size: 13px; color: #1A73E8; font-weight: 600; }
        .customer-detail-row { font-size: 12px; color: var(--text-dark); margin-bottom: 3px; }
        
        .customer-expanded-zone {
            margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(227, 213, 202, 0.4);
            display: none;
        }
        .customer-card.open .customer-expanded-zone { display: block; }
        .edit-crm-group {
            background-color: var(--pure-white); padding: 10px; border-radius: 12px;
            border: 1px solid var(--accent-latte); margin-bottom: 8px;
        }
        .edit-crm-title { font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 6px; }
        .btn-mini-save {
            background-color: var(--text-dark); color: var(--pure-white); border: none;
            border-radius: 8px; padding: 6px 12px; font-size: 11px; cursor: pointer; float: right; margin-top: 4px;
        }
        .no-data { text-align: center; color: var(--text-muted); font-size: 14px; padding: 20px 0; }
    </style>
</head>
<body>

    <nav class="top-toolbar">
        <button class="nav-btn active" onclick="switchPage('calendar-page', this)">1. 月曆</button>
        <button class="nav-btn" onclick="switchPage('all-records-page', this)">2. 總紀錄</button>
        <button class="nav-btn" onclick="switchPage('reports-page', this)">3. 報表</button>
        <button class="nav-btn" onclick="switchPage('customers-page', this)">4. 客戶資料</button>
    </nav>

    <header class="shop-header">
        <h1>MUMU STUDIO</h1>
        <p>沐 目 ﹒ 美 睫 記 帳 與 客 戶 管 理</p>
    </header>

    <main id="calendar-page" class="page active">
        <div class="card-box">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)">❮</button>
                <div>
                    <select id="select-cal-year" class="calendar-title-select" onchange="selectCalendarDate()"></select>
                    <select id="select-cal-month" class="calendar-title-select" onchange="selectCalendarDate()"></select>
                </div>
                <button onclick="changeMonth(1)">❯</button>
            </div>
            <div class="weekdays">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div id="calendar-days" class="days-grid"></div>
        </div>

        <div class="card-box">
            <div class="card-title"><span id="selected-date-label">收支紀錄</span></div>
            <div style="margin-bottom: 18px; padding-bottom: 15px; border-bottom: 1px solid rgba(227, 213, 202, 0.4);">
                
                <div class="form-group">
                    <select id="add-type" class="input-style" onchange="handleTypeChange()">
                        <option value="收入">收入 (美睫/儲值)</option>
                        <option value="支出">支出 (店鋪開銷)</option>
                    </select>
                    
                    <div id="cust-name-wrapper" class="income-only-field">
                        <input type="text" id="add-cust-name" class="input-style" placeholder="客戶姓名">
                    </div>
                </div>

                <div class="form-group">
                    <div style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div class="quick-tag-wrapper">
                            <span class="quick-tag" onclick="quickSelectProject('美睫')">＋ 美睫</span>
                            <span class="quick-tag" onclick="quickSelectProject('睫毛管理')">＋ 睫毛管理</span>
                        </div>
                        <input type="text" id="add-project" class="input-style" style="grid-column: 1 / -1;" placeholder="施作項目 或 自行填寫">
                    </div>
                </div>

                <div class="form-group">
                    <input type="number" id="add-amount" class="input-style" placeholder="金額" inputmode="numeric">
                    
                    <div id="deposit-wrapper" class="income-only-field">
                        <input type="number" id="add-deposit" class="input-style" placeholder="儲值餘額 (無改動可空)" inputmode="numeric">
                    </div>
                </div>

                <div class="form-group" style="grid-template-columns: 1fr;">
                    <input type="text" id="add-note" class="input-style" placeholder="備註說明 📝">
                </div>

                <button class="btn-submit" onclick="addRecord()">確認新增紀錄</button>
            </div>
            <ul id="day-record-list" class="record-list"></ul>
        </div>
    </main>

    <main id="all-records-page" class="page">
        <div class="card-box">
            <div class="card-title">歷史所有明細</div>
            <div class="search-container">
                <input type="text" id="search-input" class="search-bar" placeholder="輸入關鍵字搜尋（姓名、項目、備註）">
                <button class="btn-search-icon" onclick="renderAllRecords()">🔍</button>
            </div>
            <div id="all-records-container" class="scroll-container"></div>
        </div>
    </main>

    <main id="reports-page" class="page">
        <div class="report-filter-bar">
            <select id="report-year-select" class="select-report" onchange="renderReports()"></select>
            <select id="report-month-select" class="select-report" onchange="renderReports()">
                <option value="all">全年總覽</option>
                <option value="0">1 月</option><option value="1">2 月</option><option value="2">3 月</option>
                <option value="3">4 月</option><option value="4">5 月</option><option value="5">6 月</option>
                <option value="6">7 月</option><option value="7">8 月</option><option value="8">9 月</option>
                <option value="9">10 月</option><option value="10">11 月</option><option value="11">12 月</option>
            </select>
        </div>

        <div class="report-summary">
            <div class="summary-mini-card"><p>區間總收入</p><h3 id="rep-total-income" style="color: var(--income-green);">$0</h3></div>
            <div class="summary-mini-card"><p>區間總支出</p><h3 id="rep-total-expense" style="color: var(--expense-red);">$0</h3></div>
        </div>
        <div class="card-box">
            <div class="card-title">
                <span>財務效益分析</span>
                <span id="report-scope-label" style="font-size:13px; color:var(--text-muted);"></span>
            </div>
            <div class="stat-row" style="margin-bottom: 20px;">
                <span style="font-weight: bold;">營運淨利:</span>
                <span id="rep-net-profit" style="font-size: 18px; font-weight: bold;">$0</span>
            </div>
            <div>
                <p style="font-size: 14px; font-weight: 600; margin-bottom: 10px;">施作項目排行 (收入分析)</p>
                <div id="income-ranking-container"></div>
            </div>
        </div>
    </main>

    <main id="customers-page" class="page">
        <div class="birthday-banner">
            <div class="birthday-banner-title">🎂 <span id="current-month-title"></span>月壽星提醒專區</div>
            <ul id="birthday-list-container" class="birthday-list"></ul>
        </div>

        <div class="card-box">
            <div class="card-title">客戶管理中心</div>
            <div class="search-container">
                <input type="text" id="cust-search-input" class="search-bar" placeholder="輸入客戶姓名搜尋...">
                <button class="btn-search-icon" onclick="renderCustomerPage()">🔍</button>
            </div>
            <div id="customers-container" class="scroll-container"></div>
        </div>
    </main>

    <script>
        // --- 初始化資料與狀態 ---
        let records = JSON.parse(localStorage.getItem('mumu_records_v4')) || [];
        let customerCRM = JSON.parse(localStorage.getItem('mumu_crm_v4')) || {};
        
        let currentDate = new Date();
        const todayStr = formatDateString(new Date());
        let selectedDateStr = todayStr;

        window.onload = function() {
            buildYearDropdowns();
            buildMonthDropdown();
            initCalendar();
            renderDayRecords();
            handleTypeChange();
        };

        function formatDateString(dateObj) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function saveData() {
            localStorage.setItem('mumu_records_v4', JSON.stringify(records));
            localStorage.setItem('mumu_crm_v4', JSON.stringify(customerCRM));
        }

        function escapeHtml(text) {
            if(!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function handleTypeChange() {
            const type = document.getElementById('add-type').value;
            const custWrapper = document.getElementById('cust-name-wrapper');
            const depositWrapper = document.getElementById('deposit-wrapper');

            if (type === '收入') {
                custWrapper.style.display = 'block';
                depositWrapper.style.display = 'block';
            } else {
                custWrapper.style.display = 'none';
                depositWrapper.style.display = 'none';
                document.getElementById('add-cust-name').value = '';
                document.getElementById('add-deposit').value = '';
            }
        }

        function quickSelectProject(projectName) {
            document.getElementById('add-project').value = projectName;
        }

        function buildYearDropdowns() {
            const currentYear = new Date().getFullYear();
            const calYearSelect = document.getElementById('select-cal-year');
            const repYearSelect = document.getElementById('report-year-select');
            
            calYearSelect.innerHTML = '';
            repYearSelect.innerHTML = '';

            for (let y = currentYear - 3; y <= currentYear + 5; y++) {
                let opt1 = document.createElement('option');
                opt1.value = y; opt1.innerText = `${y} 年`;
                calYearSelect.appendChild(opt1);

                let opt2 = document.createElement('option');
                opt2.value = y; opt2.innerText = `${y} 年度`;
                repYearSelect.appendChild(opt2);
            }
            repYearSelect.value = currentYear;
        }

        function buildMonthDropdown() {
            const calMonthSelect = document.getElementById('select-cal-month');
            calMonthSelect.innerHTML = '';
            for (let m = 0; m < 12; m++) {
                let opt = document.createElement('option');
                opt.value = m; opt.innerText = `${m + 1} 月`;
                calMonthSelect.appendChild(opt);
            }
        }

        function switchPage(pageId, btnElement) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');

            if (pageId === 'all-records-page') renderAllRecords();
            if (pageId === 'reports-page') renderReports();
            if (pageId === 'calendar-page') { initCalendar(); renderDayRecords(); }
            if (pageId === 'customers-page') renderCustomerPage();
        }

        // ==================== 月曆核心邏輯 ====================
        function initCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            document.getElementById('select-cal-year').value = year;
            document.getElementById('select-cal-month').value = month;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();
            const daysContainer = document.getElementById('calendar-days');
            daysContainer.innerHTML = '';

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.classList.add('day-cell', 'empty');
                daysContainer.appendChild(emptyCell);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dayCell = document.createElement('div');
                dayCell.classList.add('day-cell');
                const currentCellDateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                dayCell.innerHTML = `<div class="day-number">${day}</div>`;
                if (records.some(r => r.date === currentCellDateStr)) {
                    const dot = document.createElement('div');
                    dot.classList.add('day-dot');
                    dayCell.appendChild(dot);
                }

                if (currentCellDateStr === todayStr) dayCell.classList.add('today');
                if (currentCellDateStr === selectedDateStr) dayCell.classList.add('selected');

                dayCell.onclick = function() {
                    selectedDateStr = currentCellDateStr;
                    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                    dayCell.classList.add('selected');
                    renderDayRecords();
                };
                daysContainer.appendChild(dayCell);
            }
        }

        function selectCalendarDate() {
            const y = parseInt(document.getElementById('select-cal-year').value);
            const m = parseInt(document.getElementById('select-cal-month').value);
            currentDate.setFullYear(y);
            currentDate.setMonth(m);
            initCalendar();
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            initCalendar();
        }

        function renderDayRecords() {
            const dateParts = selectedDateStr.split('-');
            document.getElementById('selected-date-label').innerText = `${parseInt(dateParts[1])}月${parseInt(dateParts[2])}日 收支紀錄`;

            const dayRecords = records.filter(r => r.date === selectedDateStr);
            const listContainer = document.getElementById('day-record-list');
            listContainer.innerHTML = '';

            if (dayRecords.length === 0) {
                listContainer.innerHTML = '<li class="no-data">今日尚無收支紀錄清單</li>';
                return;
            }

            dayRecords.forEach(rec => {
                const li = document.createElement('li');
                li.classList.add('record-item');
                const isInc = rec.type === '收入';
                const typeClass = isInc ? 'inc' : 'exp';

                // 修正1：支出一律只顯示「店鋪」
                const displayName = isInc ? (rec.custName ? rec.custName : '無名客') : '店鋪';

                li.innerHTML = `
                    <div class="rec-top">
                        <div>
                            <span class="type-tag ${typeClass}">${rec.type}</span>
                            <span style="font-weight:600;">${escapeHtml(displayName)}</span>
                        </div>
                        <div>
                            <span class="record-amount ${typeClass}">${isInc?'+':'-'}$${rec.amount}</span>
                            <button class="btn-delete" onclick="deleteRecord('${rec.id}', 'day')">🗑️</button>
                        </div>
                    </div>
                    <div class="rec-mid">項目: ${escapeHtml(rec.project)}</div>
                    ${isInc ? `
                    <div class="rec-bot">
                        <span>儲值金餘額: ${rec.deposit !== '' ? '$'+rec.deposit : '未記錄'}</span>
                        ${rec.note ? `<span style="margin-left:10px;">📝 ${escapeHtml(rec.note)}</span>` : ''}
                    </div>
                    ` : `
                    <div class="rec-bot">
                        ${rec.note ? `<span>📝 ${escapeHtml(rec.note)}</span>` : ''}
                    </div>
                    `}
                `;
                listContainer.appendChild(li);
            });
        }

        function addRecord() {
            const type = document.getElementById('add-type').value;
            const custName = type === '收入' ? document.getElementById('add-cust-name').value.trim() : '';
            const depositInput = type === '收入' ? document.getElementById('add-deposit').value.trim() : '';
            
            const project = document.getElementById('add-project').value.trim() || (type === '收入' ? '美睫服務' : '日常開銷');
            const amount = parseInt(document.getElementById('add-amount').value);
            const note = document.getElementById('add-note').value.trim();

            if (isNaN(amount) || amount <= 0) {
                alert('請輸入有效的金額數字');
                return;
            }

            const newRecord = {
                id: 'id_' + Date.now() + Math.random().toString(36).substr(2, 4),
                date: selectedDateStr,
                type: type,
                custName: custName,
                project: project,
                amount: amount,
                deposit: depositInput !== '' ? parseInt(depositInput) : '',
                note: note
            };

            records.push(newRecord);
            if (type === '收入' && custName && !customerCRM[custName]) {
                customerCRM[custName] = { phone: '', birthday: '' };
            }
            saveData();

            document.getElementById('add-cust-name').value = '';
            document.getElementById('add-project').value = '';
            document.getElementById('add-amount').value = '';
            document.getElementById('add-deposit').value = '';
            document.getElementById('add-note').value = '';

            initCalendar();
            renderDayRecords();
        }

        function deleteRecord(id, pageSource) {
            if(confirm('確定要刪除此筆紀錄嗎？')) {
                records = records.filter(r => r.id !== id);
                saveData();
                if (pageSource === 'day') { initCalendar(); renderDayRecords(); }
                if (pageSource === 'all') renderAllRecords();
                if (pageSource === 'cust') renderCustomerPage();
            }
        }

        // ==================== 頁面 2: 總紀錄 ====================
        function renderAllRecords() {
            const container = document.getElementById('all-records-container');
            const searchKey = document.getElementById('search-input').value.toLowerCase().trim();
            container.innerHTML = '';

            let filtered = records.filter(r => 
                r.project.toLowerCase().includes(searchKey) || 
                (r.custName && r.custName.toLowerCase().includes(searchKey)) ||
                (r.note && r.note.toLowerCase().includes(searchKey)) ||
                (!r.custName && '店鋪'.includes(searchKey) && r.type === '支出')
            );

            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-data">找不到相關紀錄</div>';
                return;
            }

            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            let currentGroupDate = "";
            let currentGroupDiv = null;

            filtered.forEach(rec => {
                if (rec.date !== currentGroupDate) {
                    currentGroupDate = rec.date;
                    const groupWrapper = document.createElement('div');
                    const dateTitle = document.createElement('div');
                    dateTitle.classList.add('date-group-title');
                    dateTitle.innerText = rec.date;
                    groupWrapper.appendChild(dateTitle);
                    container.appendChild(groupWrapper);
                    currentGroupDiv = groupWrapper;
                }

                const item = document.createElement('div');
                item.classList.add('record-item');
                const isInc = rec.type === '收入';
                const typeClass = isInc ? 'inc' : 'exp';
                
                // 修正1：支出一律只顯示「店鋪」
                const displayName = isInc ? (rec.custName ? rec.custName : '無名客') : '店鋪';
                
                item.innerHTML = `
                    <div class="rec-top">
                        <div><span class="type-tag ${typeClass}">${rec.type}</span><span style="font-weight:600;">${escapeHtml(displayName)}</span></div>
                        <div><span class="record-amount ${typeClass}">${isInc?'+':'-'}$${rec.amount}</span><button class="btn-delete" onclick="deleteRecord('${rec.id}', 'all')">🗑️</button></div>
                    </div>
                    <div class="rec-mid">項目: ${escapeHtml(rec.project)}</div>
                    ${isInc ? `
                    <div class="rec-bot"><span>儲值金: ${rec.deposit !== '' ? '$'+rec.deposit : '未記錄'}</span>${rec.note ? `<span style="margin-left:10px;">📝 ${escapeHtml(rec.note)}</span>` : ''}</div>
                    ` : `
                    <div class="rec-bot">${rec.note ? `<span>📝 ${escapeHtml(rec.note)}</span>` : ''}</div>
                    `}
                `;
                currentGroupDiv.appendChild(item);
            });
        }

        // ==================== 頁面 3: 報表 ====================
        function renderReports() {
            const selectedYear = parseInt(document.getElementById('report-year-select').value);
            const selectedMonthVal = document.getElementById('report-month-select').value;
            
            const scopeLabel = document.getElementById('report-scope-label');
            if (selectedMonthVal === 'all') {
                scopeLabel.innerText = `${selectedYear} 全年度總覽`;
            } else {
                scopeLabel.innerText = `${selectedYear} 年 ${parseInt(selectedMonthVal) + 1} 月 統計`;
            }

            const filteredRecords = records.filter(r => {
                const d = new Date(r.date);
                if (d.getFullYear() !== selectedYear) return false;
                if (selectedMonthVal !== 'all' && d.getMonth() !== parseInt(selectedMonthVal)) return false;
                return true;
            });

            let totalIncome = 0; 
            let totalExpense = 0; 
            let projectRanking = {};

            filteredRecords.forEach(r => {
                if (r.type === '收入') {
                    totalIncome += r.amount;
                    projectRanking[r.project] = (projectRanking[r.project] || 0) + r.amount;
                } else { 
                    totalExpense += r.amount; 
                }
            });

            const netProfit = totalIncome - totalExpense;
            document.getElementById('rep-total-income').innerText = `$${totalIncome.toLocaleString()}`;
            document.getElementById('rep-total-expense').innerText = `$${totalExpense.toLocaleString()}`;
            
            const netProfitEl = document.getElementById('rep-net-profit');
            netProfitEl.innerText = `${netProfit >= 0 ? '' : '-'}$${Math.abs(netProfit).toLocaleString()}`;
            netProfitEl.style.color = netProfit >= 0 ? 'var(--income-green)' : 'var(--expense-red)';

            const rankingContainer = document.getElementById('income-ranking-container');
            rankingContainer.innerHTML = '';

            const sortedRank = Object.keys(projectRanking).map(key => {
                return { project: key, amount: projectRanking[key] };
            }).sort((a, b) => b.amount - a.amount);

            if(sortedRank.length === 0) {
                rankingContainer.innerHTML = '<p class="no-data">此區間尚無收入項目明細</p>';
                return;
            }

            const maxAmount = sortedRank[0].amount;
            sortedRank.forEach((item, index) => {
                const percentage = maxAmount > 0 ? (item.amount / maxAmount) * 100 : 0;
                const rankRow = document.createElement('div');
                rankRow.style.marginBottom = '12px';
                rankRow.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:13px;">
                        <span>${index + 1}. ${escapeHtml(item.project)}</span>
                        <span style="font-weight:600;">$${item.amount.toLocaleString()}</span>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${percentage}%"></div></div>
                `;
                rankingContainer.appendChild(rankRow);
            });
        }

        // ==================== 頁面 4: 客戶資料 ====================
        function renderCustomerPage() {
            const thisMonth = new Date().getMonth() + 1;
            document.getElementById('current-month-title').innerText = thisMonth;

            const container = document.getElementById('customers-container');
            const searchKey = document.getElementById('cust-search-input').value.trim().toLowerCase();
            container.innerHTML = '';

            let customerMap = {};
            
            records.forEach(r => {
                // 支出不納入客戶列表統計
                if (r.type === '支出' || !r.custName) return;
                const name = r.custName.trim();
                if (searchKey && !name.toLowerCase().includes(searchKey)) return;

                if (!customerMap[name]) {
                    const crmData = customerCRM[name] || { phone: '', birthday: '' };
                    customerMap[name] = {
                        name: name,
                        phone: crmData.phone || '',
                        birthday: crmData.birthday || '',
                        visitCount: 0,
                        latestDeposit: '未記錄',
                        latestDepositTime: 0,
                        history: []
                    };
                }

                customerMap[name].visitCount++;
                customerMap[name].history.push(r);

                const recordTime = new Date(r.date).getTime();
                if (r.deposit !== '' && recordTime >= customerMap[name].latestDepositTime) {
                    customerMap[name].latestDeposit = '$' + r.deposit;
                    customerMap[name].latestDepositTime = recordTime;
                }
            });

            Object.keys(customerCRM).forEach(name => {
                if (searchKey && !name.toLowerCase().includes(searchKey)) return;
                if (!customerMap[name]) {
                    customerMap[name] = {
                        name: name,
                        phone: customerCRM[name].phone || '',
                        birthday: customerCRM[name].birthday || '',
                        visitCount: 0,
                        latestDeposit: '未記錄',
                        history: []
                    };
                }
            });

            const customers = Object.values(customerMap);

            const birthdayContainer = document.getElementById('birthday-list-container');
            birthdayContainer.innerHTML = '';
            
            let birthdayCount = 0;
            customers.forEach(cust => {
                if (cust.birthday && cust.birthday.length === 4) {
                    const mPart = parseInt(cust.birthday.substring(0, 2), 10);
                    if (mPart === thisMonth) {
                        birthdayCount++;
                        const formattedBirthDisplay = `${cust.birthday.substring(0,2)}月${cust.birthday.substring(2,4)}日`;
                        const li = document.createElement('li');
                        li.innerHTML = `🎉 <strong>${escapeHtml(cust.name)}</strong> (${formattedBirthDisplay}) ${cust.phone ? ` 📞 ${escapeHtml(cust.phone)}` : ''}`;
                        birthdayContainer.appendChild(li);
                    }
                }
            });
            if (birthdayCount === 0) {
                birthdayContainer.innerHTML = '<li>本月暫無壽星顧客記錄</li>';
            }

            if (customers.length === 0) {
                container.innerHTML = '<div class="no-data">暫無符合條件的客戶資料</div>';
                return;
            }

            customers.sort((a, b) => a.name.localeCompare(b.name, 'zh-Hans-CN'));

            customers.forEach(cust => {
                const card = document.createElement('div');
                card.classList.add('customer-card');

                cust.history.sort((a, b) => new Date(b.date) - new Date(a.date));
                let historyHtml = cust.history.map(h => `
                    <div style="border-top:1px dashed rgba(227,213,202,0.3); padding-top:4px; margin-top:4px;">
                        <span style="color:var(--text-muted);">${h.date}</span> | <span>${escapeHtml(h.project)}</span> 
                        <span style="font-weight:600; color:${h.type==='收入'?'var(--income-green)':'var(--expense-red)'};">(${h.type==='收入'?'+':'-'}$${h.amount})</span>
                    </div>
                `).join('');

                let birthDisplay = '未填寫';
                if(cust.birthday && cust.birthday.length === 4) {
                    birthDisplay = `${cust.birthday.substring(0,2)} / ${cust.birthday.substring(2,4)}`;
                }

                card.innerHTML = `
                    <div class="customer-card-header" onclick="toggleCard(this.parentNode)">
                        <span class="customer-name">👤 ${escapeHtml(cust.name)}</span>
                        <span class="customer-deposit">儲值餘額: ${cust.latestDeposit}</span>
                    </div>
                    <div onclick="toggleCard(this.parentNode)">
                        <div class="customer-detail-row">📞 電話: ${cust.phone ? escapeHtml(cust.phone) : '未填寫'}</div>
                        <div class="customer-detail-row">🎂 生日: ${birthDisplay}</div>
                        <div class="customer-detail-row">累積消費次數: <strong>${cust.visitCount}</strong> 次</div>
                    </div>
                    
                    <div class="customer-expanded-zone">
                        <div class="edit-crm-group">
                            <div class="edit-crm-title">✏️ 編輯客戶資料</div>
                            <div style="display:flex; gap:6px; margin-bottom:6px;">
                                <input type="tel" id="edit-phone-${escapeHtml(cust.name)}" class="input-style" style="background:#fff; padding:6px; font-size:12px;" placeholder="手機號碼" value="${escapeHtml(cust.phone)}">
                                <input type="number" id="edit-birth-${escapeHtml(cust.name)}" class="input-style" style="background:#fff; padding:6px; font-size:12px;" placeholder="生日4碼 (如0529)" inputmode="numeric" value="${escapeHtml(cust.birthday)}">
                            </div>
                            <button class="btn-mini-save" onclick="saveCRMData('${escapeHtml(cust.name)}')">儲存資料</button>
                            <div style="clear:both;"></div>
                        </div>
                        <div style="margin-top:8px;">
                            <p style="font-size:11px; font-weight:600; color:var(--text-muted);">歷史到店明細：</p>
                            <div style="max-height:90px; overflow-y:auto; font-size:12px;">
                                ${historyHtml || '<span style="color:var(--text-muted)">無消費明細</span>'}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 其餘輔助函式維持不變
        function toggleCard(cardElement) {
            const isOpen = cardElement.classList.contains('open');
            document.querySelectorAll('.customer-card').forEach(c => c.classList.remove('open'));
            if (!isOpen) cardElement.classList.add('open');
        }

        function saveCRMData(name) {
            const phoneVal = document.getElementById(`edit-phone-${name}`).value.trim();
            const birthVal = document.getElementById(`edit-birth-${name}`).value.trim();

            if (birthVal && birthVal.length !== 4) {
                alert('生日格式錯誤！請輸入 4 碼數字，例如 0529。');
                return;
            }

            if (!customerCRM[name]) {
                customerCRM[name] = {};
            }
            customerCRM[name].phone = phoneVal;
            customerCRM[name].birthday = birthVal;

            saveData();
            alert(`${name} 的資料已成功同步更新！`);
            renderCustomerPage();
        }
    </script>
</body>
</html>
