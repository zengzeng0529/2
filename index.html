<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUMU STUDIO | 沐目 美睫記帳系統</title>
    <style>
        /* --- 韓系奶油風 變數設定 --- */
        :root {
            --bg-cream: #FDFBF7;
            --main-butter: #F5EBE0;
            --accent-latte: #E3D5CA;
            --text-dark: #4A3E3D;
            --text-muted: #8C7A78;
            --pure-white: #FFFFFF;
            --shadow-soft: rgba(140, 122, 120, 0.08);
            --delete-red: #E07A5F;
            --income-green: #95B46A;
            --expense-red: #E07A5F;
            --birthday-pink: #E6B8A2;
            --highlight-orange: #D87A60;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-cream); color: var(--text-dark); padding-top: 65px; padding-bottom: 30px; }
        
        .top-toolbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background-color: var(--pure-white); box-shadow: 0 2px 10px var(--shadow-soft); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding: 0 5px; }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 6px 10px; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; }
        .nav-btn.active { background-color: var(--main-butter); color: var(--text-dark); font-weight: bold; }
        
        .page { display: none; max-width: 500px; margin: 0 auto; padding: 0 14px; }
        .page.active { display: block; }
        
        .card-box { background-color: var(--pure-white); border-radius: 24px; padding: 18px; box-shadow: 0 4px 20px var(--shadow-soft); margin-bottom: 18px; border: 1px solid rgba(227, 213, 202, 0.3); }
        .shop-header { text-align: center; margin: 20px 0 15px 0; }
        .input-style { width: 100%; border: 1px solid var(--accent-latte); border-radius: 12px; padding: 9px 12px; background-color: var(--bg-cream); }
        .btn-submit { width: 100%; background-color: var(--text-dark); color: var(--pure-white); border: none; border-radius: 12px; padding: 10px; cursor: pointer; }
        
        /* 備份按鈕樣式 */
        .btn-mini-save { background-color: var(--text-dark); color: var(--pure-white); border: none; border-radius: 8px; padding: 8px 12px; font-size: 12px; cursor: pointer; margin: 2px; }
        
        /* 頁面其他元件樣式同你原先設定 */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 12px; text-align: center; }
        .day-cell { height: 40px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .day-number { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .day-cell.selected .day-number { background-color: var(--text-dark); color: var(--pure-white); }
        .record-item { border-bottom: 1px solid rgba(227, 213, 202, 0.2); padding: 12px 0; }
    </style>
</head>
<body>

    <nav class="top-toolbar">
        <button class="nav-btn active" onclick="switchPage('calendar-page', this)">月曆</button>
        <button class="nav-btn" onclick="switchPage('all-records-page', this)">明細</button>
        <button class="nav-btn" onclick="switchPage('reports-page', this)">報表</button>
        <button class="nav-btn" onclick="switchPage('customers-page', this)">客戶</button>
    </nav>

    <div style="text-align: center; margin: 20px auto; max-width: 500px;">
        <button onclick="exportData()" class="btn-mini-save" style="background-color: #8C7A78;">📥 匯出資料備份</button>
        <button onclick="document.getElementById('import-file').click()" class="btn-mini-save" style="background-color: #E07A5F;">📤 匯入備份檔</button>
        <input type="file" id="import-file" style="display:none" onchange="importData(event)">
    </div>

    <main id="calendar-page" class="page active">
        </main>

    <script>
        // --- 現有程式碼保留 ---
        // (省略部分舊代碼，請將你原先的 <script> 內容貼在此處)

        // --- 新增：資料匯出功能 ---
        function exportData() {
            const data = {
                records: records,
                crm: customerCRM,
                exportDate: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `MUMU_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        // --- 新增：資料匯入功能 ---
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!confirm('⚠️ 警告：匯入資料會覆蓋目前所有記錄，確定嗎？')) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.records && imported.crm) {
                        records = imported.records;
                        customerCRM = imported.crm;
                        saveData();
                        location.reload();
                    } else { alert('檔案格式錯誤'); }
                } catch (err) { alert('無法讀取檔案'); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
