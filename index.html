<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端備忘錄</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 0 10px; }
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #dc3545; }
        .delete-btn:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <h2>📝 雲端備忘錄 (mumu-studio)</h2>
    
    <div class="form-group">
        <input type="text" id="todoInput" placeholder="請輸入待辦事項或筆記...">
        <button id="addBtn">新增資料</button>
    </div>

    <ul id="dataList">載入中...</ul>

    <script>
        // ==========================================
        // ✅ 已自動整合你提供的 mumu-studio 專案金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCq9ZFswVWFw4z_nfUM49zmOmcYbo84ikA",
            authDomain: "mumu-studio.firebaseapp.com",
            projectId: "mumu-studio",
            storageBucket: "mumu-studio.firebasestorage.app",
            messagingSenderId: "390419965754",
            appId: "1:390419965754:web:1af3851f4a4f63a1979203",
            measurementId: "G-CH8ZWGK48L"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // 指定你的資料庫集合名稱（如果你之前是用別的名字，可以把 'todos' 改掉）
        const collectionRef = db.collection('notes
');

        // 獲取 DOM 元素
        const todoInput = document.getElementById('todoInput');
        const addBtn = document.getElementById('addBtn');
        const dataList = document.getElementById('dataList');

        // ==========================================
        // 1. 即時監聽資料庫（讀取）
        // ==========================================
        collectionRef.orderBy('timestamp', 'desc').onSnapshot((snapshot) => {
            dataList.innerHTML = ''; // 清空舊畫面
            
            if (snapshot.empty) {
                dataList.innerHTML = '<li>目前沒有任何資料（或是集合名稱不對）</li>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                
                li.innerHTML = `
                    <span>${data.content || JSON.stringify(data)}</span>
                    <button class="delete-btn" onclick="deleteData('${doc.id}')">刪除</button>
                `;
                dataList.appendChild(li);
            });
        }, (error) => {
            console.error("讀取資料失敗：", error);
            dataList.innerHTML = `<li style="color:red;">讀取失敗：${error.message}<br>請檢查 Firebase 的 Firestore Rules 權限設定！</li>`;
        });

        // ==========================================
        // 2. 新增資料到資料庫（寫入）
        // ==========================================
        addBtn.addEventListener('click', () => {
            const text = todoInput.value.trim();
            if (text === '') {
                alert('請輸入內容！');
                return;
            }

            collectionRef.add({
                content: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp() // 記錄伺服器時間
            })
            .then(() => {
                todoInput.value = ''; // 新增成功後清空輸入框
            })
            .catch((error) => {
                console.error("新增資料失敗：", error);
                alert("新增失敗：" + error.message);
            });
        });

        // 支援按 Enter 鍵新增
        todoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addBtn.click();
        });

        // ==========================================
        // 3. 刪除資料
        // ==========================================
        function deleteData(id) {
            if (confirm('確定要刪除這筆資料嗎？')) {
                collectionRef.doc(id).delete()
                .catch((error) => {
                    console.error("刪除失敗：", error);
                    alert("刪除失敗：" + error.message);
                });
            }
        }
    </script>
</body>
</html>
